name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "windows-build-*"

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: windows-x64-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: windows-x64-pnpm-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows-x64

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows MSI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pnpm tauri build `
            --target x86_64-pc-windows-msvc `
            --bundles msi `
            --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-windows-x64-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe

  publish-windows-release:
    name: Publish Windows prerelease
    if: startsWith(github.ref, 'refs/tags/windows-build-')
    needs: build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: cc-switch-windows-x64-${{ github.ref_name }}
          path: release-assets

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "CC Switch Windows x64 - $GITHUB_REF_NAME" \
            --prerelease \
            --notes "Windows x64 test build. Includes the MSI installer and executable."
